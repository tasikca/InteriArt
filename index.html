<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central Path Generator</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          // REPLACE THIS WITH YOUR ACTUAL PUBLIC KEY FROM EMAILJS
          emailjs.init({ publicKey: "YOUR_PUBLIC_KEY" });
       })();

       // 2. JavaScript function to handle the EmailJS send event
       async function sendEmailJSSVG(base64Data, targetEmail) {
            const statusDiv = document.getElementById('email-status');
            const btn = document.getElementById('email-btn');
            
            btn.disabled = true;
            btn.innerText = "Sending...";
            statusDiv.innerText = "";
            statusDiv.className = "text-sm text-center mt-2 font-semibold";

            // Format the base64 string as a Data URI for EmailJS
            const attachmentData = "data:image/svg+xml;base64," + base64Data;

            try {
                // REPLACE WITH YOUR SERVICE ID AND TEMPLATE ID
                await emailjs.send("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", {
                    to_email: targetEmail,
                    my_attachment: attachmentData,
                });
                statusDiv.innerText = "Email sent successfully!";
                statusDiv.classList.add("text-green-600");
            } catch (error) {
                console.error("FAILED...", error);
                statusDiv.innerText = "Failed to send email. Check console.";
                statusDiv.classList.add("text-red-600");
            } finally {
                btn.disabled = false;
                btn.innerText = "Email SVG";
            }
       }
    </script>
</head>
<body class="bg-gray-100 flex h-screen">

    <div class="w-72 bg-white p-6 shadow-lg overflow-y-auto">
        <h2 class="text-xl font-bold mb-6">Settings</h2>
	     
        <div class="mb-4">
            <label class="block text-sm font-medium">Polygon Vertices</label>
            <input type="range" id="numFacets" min="3" max="12" value="4" 
                   oninput="document.getElementById('facetValue').innerText = this.value" class="w-full">
            <span id="facetValue">4</span>
        </div>	

        <div class="mb-4">
            <label class="block text-sm font-medium">Number of Paths</label>
            <input type="range" id="numPaths" min="2" max="10" value="4" 
                   oninput="document.getElementById('pathValue').innerText = this.value" class="w-full">
            <span id="pathValue">4</span>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-medium">Path Color</label>
            <input type="color" id="pathColor" value="#3b82f6" class="w-full h-10">
        </div>

        <button id="generate-btn" py-click="update_plot" class="w-full bg-blue-600 text-white py-2 rounded shadow hover:bg-blue-700 transition-colors">
            Generate Graph
        </button>

        <div id="export-controls" class="hidden mt-6 pt-4 border-t border-gray-200">
            <button id="download-btn" py-click="download_svg" class="w-full bg-green-600 text-white py-2 mb-4 rounded shadow hover:bg-green-700 transition-colors">
                Download SVG
            </button>
            
            <div class="mb-2">
                <input type="email" id="email-input" placeholder="Recipient Email" class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
            </div>
            <button id="email-btn" py-click="email_svg" class="w-full bg-purple-600 text-white py-2 rounded shadow hover:bg-purple-700 transition-colors">
                Email SVG
            </button>
            <div id="email-status"></div>
        </div>
    </div>

    <div class="flex-1 p-10 flex items-center justify-center">
        <div id="plot-target" class="bg-white p-4 shadow-xl rounded-lg w-full max-w-4xl">
            </div>
    </div>

    <script type="py" src="./main.py" config="./pyscript.json"></script>
</body>
</html>
