<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central Path Generator</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex h-screen">

    <div class="w-72 bg-white p-6 shadow-lg overflow-y-auto">
        <h2 class="text-xl font-bold mb-6 border-b pb-2">Settings</h2>
	     
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700">Polygon Vertices</label>
            <input type="range" id="numFacets" min="3" max="12" value="4" 
                   oninput="document.getElementById('facetValue').innerText = this.value" class="w-full">
            <span id="facetValue" class="text-xs text-gray-500">4</span>
        </div>	

        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700">Number of Paths</label>
            <input type="range" id="numPaths" min="2" max="10" value="4" 
                   oninput="document.getElementById('pathValue').innerText = this.value" class="w-full">
            <span id="pathValue" class="text-xs text-gray-500">4</span>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700">Path Color</label>
            <input type="color" id="pathColor" value="#3b82f6" class="w-full h-10 rounded">
        </div>

        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700">Your Name (for filename)</label>
            <input type="text" id="user-name" placeholder="Enter name..." 
                   class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none text-sm">
        </div>

        <button id="generate-btn" py-click="update_plot" class="w-full bg-blue-600 text-white py-2 rounded shadow hover:bg-blue-700 transition-all font-semibold">
            Generate Graph
        </button>

        <button id="download-btn" py-click="download_svg" class="hidden w-full bg-green-600 text-white py-2 mt-4 rounded shadow hover:bg-green-700 transition-all font-semibold">
            Download SVG
        </button>
    </div>

    <div class="flex-1 p-10 flex items-center justify-center">
        <div id="plot-target" class="bg-white p-4 shadow-xl rounded-lg w-full max-w-4xl min-h-[400px] flex items-center justify-center text-gray-400">
            Click 'Generate' to create the path...
        </div>
    </div>

    <script type="py" src="./main.py" config="./pyscript.json"></script>
</body>
</html>
